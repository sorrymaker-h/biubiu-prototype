<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>biubiu Prototypes</title>
<style>
:root {
  --bg: #080a16;
  --surface: #0c0f20;
  --surface-hi: #121530;
  --border: rgba(255,255,255,0.07);
  --border-hi: rgba(78,160,255,0.25);
  --text-hi: #e8edf5;
  --text-md: #8a99b4;
  --text-lo: #546480;
  --blue: #4ea0ff;
  --blue-glow: rgba(78,160,255,0.15);
  --ease: 250ms cubic-bezier(0.4,0,0.2,1);
  --font: 'Segoe UI','PingFang SC','Microsoft YaHei',system-ui,sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  min-height: 100%;
  background: var(--bg);
  color: var(--text-hi);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 80px 24px 48px;
}
.container {
  width: 100%;
  max-width: 720px;
}

/* Header */
.header {
  margin-bottom: 48px;
}
.logo {
  font-size: 28px;
  font-weight: 800;
  color: var(--blue);
  letter-spacing: -0.5px;
  margin-bottom: 8px;
}
.logo-tag {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  color: #00d4e8;
  background: rgba(0,212,232,0.1);
  border: 1px solid rgba(0,212,232,0.2);
  padding: 2px 8px;
  border-radius: 4px;
  margin-left: 8px;
  vertical-align: middle;
  letter-spacing: 0.5px;
}
.subtitle {
  font-size: 14px;
  color: var(--text-md);
}

/* Prototype List */
.proto-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.proto-card {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 20px 24px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  text-decoration: none;
  color: inherit;
  transition: all var(--ease);
  cursor: pointer;
}
.proto-card:hover {
  background: var(--surface-hi);
  border-color: var(--border-hi);
  transform: translateY(-1px);
  box-shadow: 0 4px 24px var(--blue-glow);
}
.proto-icon {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  background: var(--blue-glow);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.proto-icon svg {
  width: 22px;
  height: 22px;
  stroke: var(--blue);
  fill: none;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.proto-info { flex: 1; min-width: 0; }
.proto-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-hi);
  margin-bottom: 3px;
}
.proto-desc {
  font-size: 12px;
  color: var(--text-md);
  line-height: 1.5;
}
.proto-arrow {
  color: var(--text-lo);
  flex-shrink: 0;
  transition: color var(--ease);
}
.proto-card:hover .proto-arrow { color: var(--blue); }
.proto-arrow svg {
  width: 18px;
  height: 18px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* Status badge */
.badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 4px;
  margin-left: 8px;
  vertical-align: middle;
  letter-spacing: 0.3px;
}
.badge--active {
  background: rgba(29,185,84,0.12);
  color: #1db954;
  border: 1px solid rgba(29,185,84,0.2);
}
.badge--wip {
  background: rgba(240,183,46,0.12);
  color: #f0b72e;
  border: 1px solid rgba(240,183,46,0.2);
}

/* Footer */
.footer {
  margin-top: 64px;
  text-align: center;
  font-size: 12px;
  color: var(--text-lo);
}

/* Empty state */
.empty-hint {
  margin-top: 32px;
  padding: 24px;
  background: rgba(255,255,255,0.02);
  border: 1px dashed rgba(255,255,255,0.08);
  border-radius: 10px;
  text-align: center;
  font-size: 13px;
  color: var(--text-lo);
  line-height: 1.7;
}
</style>
</head>
<body>

<div class="container">
  <header class="header">
    <div class="logo">biubiu<span class="logo-tag">PROTOTYPE</span></div>
    <p class="subtitle">原型设计预览 · 点击卡片打开对应原型</p>
  </header>

  <nav class="proto-list">

    <!-- local-network-detection -->
    <a class="proto-card" href="local-network-detection/">
      <div class="proto-icon">
        <svg viewBox="0 0 24 24">
          <path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z"/>
          <path d="M2 12h20"/>
          <path d="M12 2a15 15 0 0 1 4 10 15 15 0 0 1-4 10 15 15 0 0 1-4-10A15 15 0 0 1 12 2z"/>
        </svg>
      </div>
      <div class="proto-info">
        <div class="proto-name">本地网络检测<span class="badge badge--active">在线</span></div>
        <div class="proto-desc">游戏加速器客户端本地网络诊断报告与检测流程原型</div>
      </div>
      <div class="proto-arrow">
        <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </div>
    </a>

    <!-- 在这里添加更多原型卡片 -->

  </nav>

  <div class="empty-hint">
    新增原型时，在仓库根目录创建子文件夹并放入 index.html，<br>
    然后在此页面添加对应卡片即可。
  </div>

  <footer class="footer">
    biubiu Prototype Hub · sorrymaker-h
  </footer>
</div>

</body>
</html>
